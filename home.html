<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github | Issue | Traker</title>
    <!-- daisyUl + tailwindcss -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- css link -->
    <link rel="stylesheet" href="./style/style.css">
</head>

<body>
    <!-- navbar -->
    <div class="navbar bg-base-100 shadow-sm flex flex-col md:flex-row justify-between px-6">
        <div class="flex flex-col mt-4 md:flex-row  justify-center items-center gap-2">
            <img class="w-[36px] h-[37px]" src="./assets/github-logo.png" alt="">
            <a class="text-2xl font-semibold">GitHub Issues Tracker</a>
        </div>
        <div class="flex gap-2 mt-4">
            <label class="input input-bordered flex items-center gap-2">
                <i class="fa-brands fa-sistrix opacity-70"></i>
                <input id="inputSearch" type="text" class="grow" placeholder="Search issues..." />
            </label>
            <button id="btnSearch" class="btn btn-primary">Search</button>
        </div>
    </div>

    <!-- banner section -->
    <section>
        <div class="w-11/12 mx-auto  bg-white shadow-[0_0_15px_rgba(0,0,0,0.1)] rounded-md p-6 mt-20">
            <div class="flex flex-row justify-center md:justify-start gap-3">
                <input id="allBtn" type="button" value="All" class="btn hover:bg-blue-700" />
                <input id="openBtn" type="button" value="Open" class="btn hover:bg-blue-700" />
                <input id="closeBtn" type="button" value="Closed" class="btn hover:bg-blue-700" />
            </div>
        </div>
    </section>
<!-- issue container -->
    <section class="w-11/12 mx-auto shadow-[0_0_15px_rgba(0,0,0,0.1)] p-2 rounded-md mt-10 ">
        <div class="flex flex-col md:flex-row justify-between items-center p-6">
            <div class="flex flex-col md:flex-row justify-center items-center gap-2">
                <img class="w-[32px] h-[32px]" src="./assets/Aperture.png" alt="">
                <div class="flex flex-col items-center md:items-start">
                    <h2 id="totalIssueCount" class="text-[24px] font-semibold">0 Issues</h2>
                    <p class="text-gray-500">Track and manage your project issues</p>
                </div>

            </div>
            <div class="flex gap-8 pt-5 md:pt-1 ">
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 bg-green-600 rounded-full"></span>
                    <p class="font-semibold">Open</p>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 bg-purple-600 rounded-full"></span>
                    <p class="font-semibold">Closed</p>
                </div>
            </div>
        </div>
    </section>

    <!-- main container -->
    <section>
        <div id="mainContainer" class=" w-11/12 mx-auto grid grid-cols-1 md:grid-cols-4 mt-3 rounded-md gap-y-6">
            <!-- card 01 -->
            
        </div>
        <div class="flex justify-center items-center pt-10">
            <span id="loading-container" class="loading loading-bars loading-md"></span>
        </div>
    </section>


    

<div class="navbar bg-base-100 shadow-sm flex flex-col md:flex-row justify-between px-6 py-4 md:py-2 gap-4">
    <div class="flex justify-center items-center gap-2">
        <img class="w-[36px] h-[37px]" src="./assets/github-logo.png" alt="">
        <a class="text-xl md:text-2xl font-semibold">GitHub Issues Tracker</a>
    </div>
    <div class="flex gap-2 w-full md:w-auto">
        <label class="input input-bordered flex items-center gap-2 grow">
            <i class="fa-brands fa-sistrix opacity-70"></i>
            <input id="inputSearch" type="text" class="grow" placeholder="Search issues..." />
        </label>
        <button id="btnSearch" class="btn btn-primary">Search</button>
    </div>
</div>

<section>
    <div class="w-11/12 mx-auto bg-white shadow-[0_0_15px_rgba(0,0,0,0.1)] rounded-md p-6 mt-10 md:mt-20">
        <div class="flex flex-wrap gap-2 justify-center md:justify-start">
            <input id="allBtn" type="button" value="All" class="btn btn-sm md:btn-md hover:bg-blue-700" />
            <input id="openBtn" type="button" value="Open" class="btn btn-sm md:btn-md hover:bg-blue-700" />
            <input id="closeBtn" type="button" value="Closed" class="btn btn-sm md:btn-md hover:bg-blue-700" />
        </div>
    </div>
</section>

<section class="w-11/12 mx-auto shadow-[0_0_15px_rgba(0,0,0,0.1)] p-2 rounded-md mt-10">
    <div class="flex flex-col md:flex-row justify-between items-center p-6 gap-6">
        <div class="flex flex-col md:flex-row justify-center items-center gap-2 text-center md:text-left">
            <img class="w-[32px] h-[32px]" src="./assets/Aperture.png" alt="">
            <div>
                <h2 id="totalIssueCount" class="text-[20px] md:text-[24px] font-semibold">0 Issues</h2>
                <p class="text-gray-500 text-sm md:text-base">Track and manage your project issues</p>
            </div>
        </div>
        
        <div class="flex gap-6 md:gap-8">
            <div class="flex items-center gap-2">
                <span class="w-2.5 h-2.5 bg-green-600 rounded-full"></span>
                <p class="font-semibold text-sm">Open</p>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-2.5 h-2.5 bg-purple-600 rounded-full"></span>
                <p class="font-semibold text-sm">Closed</p>
            </div>
        </div>
    </div>
</section>

<script src="./script/script.js"></script>
  
</body>

</html>
