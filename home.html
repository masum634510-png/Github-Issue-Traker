<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github | Issue | Traker</title>
    <!-- daisyUl + tailwindcss -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- css link -->
    <link rel="stylesheet" href="./style/style.css">
</head>

<body>
    <!-- navbar -->
    <div class="navbar bg-base-100 shadow-sm flex justify-between px-6">
        <div class="flex justify-center items-center gap-2">
            <img class="w-[36px] h-[37px]" src="./assets/github-logo.png" alt="">
            <a class="text-2xl font-semibold">GitHub Issues Tracker</a>
        </div>
        <div class="flex gap-2">
            <label class="input input-bordered flex items-center gap-2">
                <i class="fa-brands fa-sistrix opacity-70"></i>
                <input type="text" class="grow" placeholder="Search issues..." />
            </label>
            <button id="searchBtn" class="btn btn-primary">Search</button>
        </div>
    </div>

    <!-- banner section -->
    <section>
        <div class="w-11/12 mx-auto bg-white shadow-[0_0_15px_rgba(0,0,0,0.1)] rounded-md p-6 mt-20">
            <div class="flex gap-2">
                <input id="allBtn" type="button" value="All" class="btn bg-blue-700 text-white" />
                <input id="openBtn" type="button" value="Open" class="btn" />
                <input id="buttonBtn" type="button" value="Closed" class="btn" />
            </div>
        </div>
    </section>

    <section class="w-11/12 mx-auto shadow-[0_0_15px_rgba(0,0,0,0.1)] p-2 rounded-md mt-10 ">
        <div class="flex justify-between items-center p-6">
            <div class="flex justify-center items-center gap-2">
                <img class="w-[32px] h-[32px]" src="./assets/Aperture.png" alt="">
                <div class="">
                    <h2 class="text-[24px] font-semibold">50 Issues</h2>
                    <p class="text-gray-500">Track and manage your project issues</p>
                </div>

            </div>
            <div class="flex gap-8">
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 bg-green-600 rounded-full"></span>
                    <p class="font-semibold">Open</p>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-2.5 h-2.5 bg-purple-600 rounded-full"></span>
                    <p class="font-semibold">Closed</p>
                </div>
            </div>
        </div>
    </section>

    <!-- main container -->
    <section>
        <div id="mainContainer" class="  w-11/12 mx-auto grid grid-cols-1 md:grid-cols-4 mt-3 rounded-md gap-y-6">
            <!-- card 01 -->

        </div>
    </section>


    



<script src="./script/script.js"></script>
  
</body>

</html>
