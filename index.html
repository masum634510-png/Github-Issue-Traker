<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github | Issue | Traker</title>
    <!-- daisyUl + tailwindcss -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- css link -->
    <link rel="stylesheet" href="./style/style.css">
</head>

<body> 
    <!-- github login page -->
    <section class="w-[90%] max-w-[450px] h-[720px] mx-auto bg-white  rounded-md shadow-[0_0_15px_rgba(0,0,0,0.1)] m-6">
        <div class=" flex flex-col items-center justify-center mx-auto pt-15 pb-5">
            <img class="" src="./assets/github-logo.png" alt="">
            <h2 class="text-2xl font-semibold pt-4 ">GitHub Issues Tracker</h2>
            <p class="text-gray-400">Sign in to manage your issues</p>
        </div>

        <label class="">
            <div class="p-6">
                <p class="font-semibold">User Name</p>
                <input id="userNameBtn" class="py-1 px-2 rounded-sm border border-gray-400 w-[100%] my-1" type="text" name="" id=""
                    placeholder="Enter Username">
                <p class="text-indigo-600 text-[16px]">Default:admin</p>

                <p class="font-semibold mt-3">Password</p>
                <input id="passwordBtn" class="py-1 px-2 rounded-sm border border-gray-400 w-[100%] my-1" type="text" name="" id=""
                    placeholder="Enter your Password">
                <p class="text-indigo-600 text-[16px]">Default:admin123</p>

                <button id="singInBtn" class="bg-blue-600 py-1  rounded-md w-[100%] text-white mt-4">Sing In</button>
            </div>

            <div class="flex flex-col items-center justify-center">
                <p>OR</p>
                <p class="text-gray-400 text-[16px] pt-4">Demo Credentials</p>
                <div class="mt-8 items-center justify-center flex flex-col">
                    <h2 class="font-[56px]"><span class="font-semibold text-[18px]">Username:</span>admin</h2>
                    <h2 class="font-[16px]"><span class="font-semibold text-[18px]">Password:</span>admin123</h2>
                </div>
            </div>

        </label>
    </section>

    <!-- modal -->
    <!-- Open the modal using ID.showModal() method -->
    <button class="btn" onclick="my_modal_5.showModal()">open modal</button>
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <h3 class="text-lg font-bold">Masum tamake partei hobe!</h3>
            <p class="py-4">valo are lage na</p>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>





    <script src="./script/script.js"></script>
    <script src="./script/script.js"></script>
</body>

</html>
